name: Backend CI

on:
  push:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - "database/migrations/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: ["main", "develop"]
    paths:
      - "backend/**"
      - "database/migrations/**"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: roomrental
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d roomrental"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: npm ci

      - name: Prepare test env
        run: |
          cp .env.example .env
          sed -i 's|^DATABASE_URL=.*|DATABASE_URL=postgresql://postgres:postgres@localhost:5433/roomrental|' .env
          sed -i 's|^JWT_ACCESS_SECRET=.*|JWT_ACCESS_SECRET=ci_access_secret|' .env
          sed -i 's|^JWT_REFRESH_SECRET=.*|JWT_REFRESH_SECRET=ci_refresh_secret|' .env

      - name: Run migrations
        working-directory: .
        run: |
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/001_init_schema.sql
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/002_seed_reference_data.sql
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/003_auth_sessions.sql
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/004_saved_searches_alerts.sql
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/005_alert_delivery_channels.sql
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/006_payments_membership_context.sql
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/007_async_job_queues.sql
          psql postgresql://postgres:postgres@localhost:5433/roomrental -f database/migrations/008_worker_observability.sql

      - name: Run tests
        run: npm test
